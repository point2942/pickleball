<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>重設密碼 - 匹克球場地預約</title>
<style>
  *{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
  body{margin:0;background:#f3f4f6;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .card{background:#fff;border-radius:20px;box-shadow:0 4px 24px rgba(10,110,78,.12);padding:2rem 1.75rem;width:100%;max-width:380px}
  h1{font-size:18px;color:#111827;margin:0 0 6px}
  p.sub{font-size:13px;color:#6b7280;margin:0 0 20px}
  .form-group{margin-bottom:14px}
  label{display:block;font-size:13px;color:#374151;margin-bottom:6px;font-weight:500}
  input{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px}
  input:focus{outline:none;border-color:#0a6e4e}
  .pw-wrap{position:relative}
  .pw-wrap input{padding-right:42px}
  .pw-toggle{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:6px;color:#9ca3af;display:flex;align-items:center;justify-content:center}
  .pw-toggle:hover{color:#374151}
  .pw-toggle svg{width:20px;height:20px}
  button{width:100%;background:#0a6e4e;color:#fff;border:none;padding:12px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
  button:hover{background:#085c40}
  button:disabled{background:#9ca3af;cursor:not-allowed}
  .err{font-size:13px;color:#dc2626;margin-top:6px;display:none}
  .msg{font-size:13px;color:#0a6e4e;margin-top:6px;display:none}
  a{color:#0a6e4e;text-decoration:none;font-size:13px}
</style>
</head>
<body>
  <div class="card">
    <div id="formBox">
      <h1>重設密碼</h1>
      <p class="sub">請輸入您的新密碼</p>
      <div class="form-group">
        <label>新密碼</label>
        <div class="pw-wrap">
          <input type="password" id="newPassword" placeholder="至少 6 個字元"/>
          <button type="button" class="pw-toggle" onclick="togglePw('newPassword', this)" aria-label="顯示密碼">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label>確認新密碼</label>
        <div class="pw-wrap">
          <input type="password" id="confirmPassword" placeholder="請再輸入一次"/>
          <button type="button" class="pw-toggle" onclick="togglePw('confirmPassword', this)" aria-label="顯示密碼">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="err" id="errBox"></div>
      <div class="msg" id="msgBox"></div>
      <button id="submitBtn" onclick="doReset()">設定新密碼</button>
    </div>
    <div id="successBox" style="display:none">
      <h1>密碼已重設成功</h1>
      <p class="sub">您可以使用新密碼登入了</p>
      <button onclick="location.href='/'">前往登入</button>
    </div>
    <div id="invalidBox" style="display:none">
      <h1>連結無效或已過期</h1>
      <p class="sub">請重新申請重設密碼信件</p>
      <button onclick="location.href='/'">返回首頁</button>
    </div>
  </div>

<script>
function togglePw(inputId, btn) {
  const input = document.getElementById(inputId);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  btn.innerHTML = isHidden
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.5 18.5 0 0 1 4.22-5.07M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>';
}

function getToken() {
  const params = new URLSearchParams(window.location.search);
  return params.get('token');
}

async function doReset() {
  const token = getToken();
  const password = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;
  const errBox = document.getElementById('errBox');
  const msgBox = document.getElementById('msgBox');
  errBox.style.display = 'none';
  msgBox.style.display = 'none';

  if (!token) { showInvalid(); return; }
  if (!password || password.length < 6) { errBox.textContent = '密碼至少需 6 個字元'; errBox.style.display = 'block'; return; }
  if (password !== confirm) { errBox.textContent = '兩次輸入的密碼不一致'; errBox.style.display = 'block'; return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '處理中...';

  try {
    const res = await fetch('/api/auth/member/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '重設失敗');

    document.getElementById('formBox').style.display = 'none';
    document.getElementById('successBox').style.display = 'block';
  } catch (e) {
    errBox.textContent = e.message;
    errBox.style.display = 'block';
    btn.disabled = false; btn.textContent = '設定新密碼';
  }
}

function showInvalid() {
  document.getElementById('formBox').style.display = 'none';
  document.getElementById('invalidBox').style.display = 'block';
}

if (!getToken()) showInvalid();
</script>
</body>
</html>
