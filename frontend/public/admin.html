<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>後台管理 - 匹克球場地</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fa;color:#1a1a2e}
.hidden{display:none!important}
nav{background:#1a1a2e;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:52px}
.nav-logo{font-size:15px;font-weight:600;color:#fff}
.btn-logout{background:none;border:1px solid #4b5563;color:#9ca3af;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:13px}
.container{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.tabs{display:flex;gap:4px;background:#fff;border-radius:12px;padding:4px;border:1px solid #e8eaf0;margin-bottom:1.25rem;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:9px;font-size:13px;cursor:pointer;border:none;background:none;color:#6b7280;font-weight:500}
.tab.active{background:#1a1a2e;color:#fff}
.tc{display:none}.tc.active{display:block}
.card{background:#fff;border-radius:12px;border:1px solid #e8eaf0;padding:1.25rem;margin-bottom:12px}
.card-title{font-size:15px;font-weight:600;margin-bottom:1rem}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.25rem}
.sc{background:#fff;border-radius:12px;border:1px solid #e8eaf0;padding:1.25rem;text-align:center}
.sc-n{font-size:28px;font-weight:700;color:#0a6e4e}
.sc-l{font-size:13px;color:#9ca3af;margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:#6b7280;border-bottom:2px solid #f0f0f5;letter-spacing:.5px}
td{padding:10px;border-bottom:1px solid #f5f5fa;vertical-align:middle}
tr:last-child td{border-bottom:none}
.badge{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:500}
.st-pending{background:#fef3c7;color:#92400e}
.st-paid{background:#d1fae5;color:#065f46}
.st-cancelled{background:#fee2e2;color:#991b1b}
.btn-sm{font-size:12px;padding:4px 10px;border-radius:7px;border:1px solid #e5e7eb;cursor:pointer;background:#fff}
.btn-sm:hover{background:#f9fafb}
.btn-sm.green{background:#0a6e4e;color:#fff;border-color:#0a6e4e}
.btn-sm.red{background:#dc2626;color:#fff;border-color:#dc2626}
input,select{padding:8px 10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;width:100%;outline:none}
input:focus{border-color:#0a6e4e}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:12px;color:#6b7280;margin-bottom:4px;font-weight:500}
.btn-green{background:#0a6e4e;color:#fff;border:none;border-radius:9px;padding:9px 18px;cursor:pointer;font-size:14px;font-weight:500}
.btn-green:hover{background:#065f46}
.login-wrap{max-width:380px;margin:80px auto;padding:0 1rem}
.login-card{background:#fff;border-radius:16px;padding:2rem;border:1px solid #e8eaf0}
.login-title{font-size:20px;font-weight:700;margin-bottom:4px;color:#1a1a2e}
.login-sub{font-size:13px;color:#9ca3af;margin-bottom:1.5rem}
.alert{background:#fee2e2;color:#991b1b;border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:10px;display:none}
.filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{width:auto;padding:7px 10px}
</style>
</head>
<body>

<!-- 登入 -->
<div id="loginPage">
  <div class="login-wrap">
    <div class="login-card">
      <div style="font-size:32px;margin-bottom:.75rem">🏓</div>
      <div class="login-title">後台管理系統</div>
      <div class="login-sub">請以管理員帳號登入</div>
      <div class="alert" id="loginErr"></div>
      <div class="form-group"><label>Email</label><input type="email" id="adminEmail" placeholder="admin@example.com"/></div>
      <div class="form-group"><label>密碼</label><input type="password" id="adminPwd" placeholder="密碼"/></div>
      <button class="btn-green" style="width:100%;margin-top:4px" onclick="doAdminLogin()">登入後台</button>
    </div>
  </div>
</div>

<!-- 主後台 -->
<div id="adminPage" class="hidden">
  <nav>
    <div class="nav-logo">🏓 匹克球場地 - 後台管理</div>
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:13px;color:#9ca3af" id="adminName"></span>
      <button class="btn-logout" onclick="adminLogout()">登出</button>
    </div>
  </nav>

  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('dashboard')">📊 儀表板</button>
      <button class="tab" onclick="switchTab('bookings')">📋 預約管理</button>
      <button class="tab" onclick="switchTab('prices')">💰 定價設定</button>
      <button class="tab" onclick="switchTab('courts')">🏟 場地管理</button>
      <button class="tab" onclick="switchTab('members')">👤 會員管理</button>
      <button class="tab" onclick="switchTab('settings')">⚙️ 設定</button>
    </div>

    <!-- 儀表板 -->
    <div id="tcDashboard" class="tc active">
      <div class="stats-grid">
        <div class="sc"><div class="sc-n" id="dToday">-</div><div class="sc-l">今日預約數</div></div>
        <div class="sc"><div class="sc-n" style="color:#f59e0b" id="dPending">-</div><div class="sc-l">待付款</div></div>
        <div class="sc"><div class="sc-n" id="dRevenue">-</div><div class="sc-l">今日營收 (NT$)</div></div>
      </div>
      <div class="card">
        <div class="card-title">今日預約一覽</div>
        <div id="dashBookings">載入中...</div>
      </div>
    </div>

    <!-- 預約管理 -->
    <div id="tcBookings" class="tc">
      <div class="filter-bar">
        <input type="date" id="filterDate" onchange="loadAdminBookings()"/>
        <select id="filterStatus" onchange="loadAdminBookings()">
          <option value="">全部狀態</option>
          <option value="pending">待付款</option>
          <option value="paid">已付款</option>
          <option value="cancelled">已取消</option>
        </select>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>日期</th><th>時間</th><th>場地</th><th>球友</th><th>金額</th><th>狀態</th><th>付款</th><th>操作</th></tr></thead>
          <tbody id="bookingsTable"></tbody>
        </table>
      </div>
    </div>

    <!-- 定價設定 -->
    <div id="tcPrices" class="tc">
      <div class="card">
        <div class="card-title">時段定價規則</div>
        <table>
          <thead><tr><th>名稱</th><th>開始時</th><th>結束時</th><th>會員價</th><th>非會員價</th><th>操作</th></tr></thead>
          <tbody id="priceTable"></tbody>
        </table>
        <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid #f0f0f5">
          <div style="font-size:14px;font-weight:600;margin-bottom:.75rem">新增規則</div>
          <div class="form-row">
            <div class="form-group"><label>名稱</label><input id="nLabel" placeholder="例：尖峰時段"/></div>
            <div class="form-group"><label>開始小時 (0-23)</label><input id="nStart" type="number" min="0" max="23"/></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>結束小時 (0-23)</label><input id="nEnd" type="number" min="0" max="23"/></div>
            <div class="form-group"><label>會員價 (NT$)</label><input id="nMember" type="number"/></div>
          </div>
          <div class="form-group"><label>非會員價 (NT$)</label><input id="nNonMember" type="number"/></div>
          <button class="btn-green" onclick="addPriceRule()">新增定價規則</button>
        </div>
      </div>
    </div>

    <!-- 場地管理 -->
    <div id="tcCourts" class="tc">
      <div class="card">
        <div class="card-title">場地列表（點擊名稱可編輯）</div>
        <div id="courtsTable">載入中...</div>
      </div>
    </div>

    <!-- 會員管理 -->
    <div id="tcMembers" class="tc">
      <div class="card">
        <table>
          <thead><tr><th>姓名</th><th>手機</th><th>身份</th><th>有效至</th><th>操作</th></tr></thead>
          <tbody id="membersTable"></tbody>
        </table>
      </div>
    </div>

    <!-- 設定 -->
    <div id="tcSettings" class="tc">
      <div class="card">
        <div class="card-title">修改管理員密碼</div>
        <div class="form-group"><label>舊密碼</label><input type="password" id="oldPwd"/></div>
        <div class="form-group"><label>新密碼</label><input type="password" id="newPwd"/></div>
        <div class="form-group"><label>確認新密碼</label><input type="password" id="newPwd2"/></div>
        <button class="btn-green" onclick="changeAdminPwd()">更新密碼</button>
        <div id="pwdMsg" style="font-size:13px;margin-top:8px"></div>
      </div>
    </div>
  </div>
</div>

<script>
let adminToken = sessionStorage.getItem('admin_token');
let adminInfo = JSON.parse(sessionStorage.getItem('admin_info')||'null');

(function init(){
  if(adminToken&&adminInfo){ showAdmin(); }
})();

async function doAdminLogin(){
  const email=document.getElementById('adminEmail').value.trim();
  const pwd=document.getElementById('adminPwd').value;
  try{
    const r=await api('POST','/api/auth/admin/login',{email,password:pwd});
    adminToken=r.token; adminInfo=r.admin;
    sessionStorage.setItem('admin_token',adminToken);
    sessionStorage.setItem('admin_info',JSON.stringify(adminInfo));
    showAdmin();
  }catch(e){ showErr('loginErr',e.message); }
}

function showAdmin(){
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('adminPage').classList.remove('hidden');
  document.getElementById('adminName').textContent=adminInfo.name;
  loadDashboard();
}

function adminLogout(){
  adminToken=null; adminInfo=null;
  sessionStorage.clear();
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('adminPage').classList.add('hidden');
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tc').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tc'+name.charAt(0).toUpperCase()+name.slice(1)).classList.add('active');
  if(name==='bookings') loadAdminBookings();
  else if(name==='prices') loadPrices();
  else if(name==='courts') loadCourts();
  else if(name==='members') loadMembers();
  else if(name==='dashboard') loadDashboard();
}

async function loadDashboard(){
  const r=await api('GET','/api/admin/dashboard');
  document.getElementById('dToday').textContent=r.todayBookings||0;
  document.getElementById('dPending').textContent=r.pendingPay||0;
  document.getElementById('dRevenue').textContent=(r.todayRevenue||0).toLocaleString();
  const today=new Date().toISOString().slice(0,10);
  const r2=await api('GET',`/api/admin/bookings?date=${today}`);
  const bks=r2.bookings||[];
  const stMap={pending:'待付款',paid:'已付款',cancelled:'已取消'};
  const stClass={pending:'st-pending',paid:'st-paid',cancelled:'st-cancelled'};
  document.getElementById('dashBookings').innerHTML=bks.length?`<table>
    <thead><tr><th>時間</th><th>場地</th><th>球友</th><th>金額</th><th>狀態</th><th>操作</th></tr></thead>
    <tbody>${bks.map(b=>`<tr>
      <td>${String(b.hour).padStart(2,'0')}:00</td>
      <td>場地${b.court_id}</td>
      <td>${b.members?.name||'-'} ${b.members?.phone||''}</td>
      <td>NT$${b.price}</td>
      <td><span class="badge ${stClass[b.status]}">${stMap[b.status]}</span></td>
      <td>${b.status==='pending'?`<button class="btn-sm green" onclick="markPaid('${b.id}')">標記付款</button> <button class="btn-sm red" onclick="adminCancel('${b.id}')">取消</button>`:'—'}</td>
    </tr>`).join('')}</tbody>
  </table>`:'<div style="color:#9ca3af;font-size:13px;padding:1rem 0">今日無預約</div>';
}

async function loadAdminBookings(){
  const date=document.getElementById('filterDate').value;
  const status=document.getElementById('filterStatus').value;
  let url='/api/admin/bookings?';
  if(date) url+=`date=${date}&`;
  if(status) url+=`status=${status}`;
  const r=await api('GET',url);
  const bks=r.bookings||[];
  const stMap={pending:'待付款',paid:'已付款',cancelled:'已取消'};
  const stClass={pending:'st-pending',paid:'st-paid',cancelled:'st-cancelled'};
  const pmMap={ecpay:'綠界',linepay:'LINE Pay',cash:'現場'};
  document.getElementById('bookingsTable').innerHTML=bks.map(b=>`<tr>
    <td>${b.date}</td>
    <td>${String(b.hour).padStart(2,'0')}:00</td>
    <td>場地${b.court_id}</td>
    <td>${b.members?.name||'-'}<br><span style="color:#9ca3af;font-size:11px">${b.members?.phone||''}</span></td>
    <td>NT$${b.price}${b.is_member_price?' <span style="font-size:10px;color:#059669">會員</span>':''}</td>
    <td><span class="badge ${stClass[b.status]}">${stMap[b.status]}</span></td>
    <td>${b.payment_method?pmMap[b.payment_method]||b.payment_method:'—'}</td>
    <td>${b.status==='pending'?`<button class="btn-sm green" onclick="markPaid('${b.id}')">付款</button> `:''}${b.status!=='cancelled'?`<button class="btn-sm red" onclick="adminCancel('${b.id}')">取消</button>`:''}</td>
  </tr>`).join('');
}

async function markPaid(id){ await api('PATCH',`/api/admin/bookings/${id}/pay`,{}); loadDashboard(); loadAdminBookings(); }
async function adminCancel(id){ if(!confirm('確定取消此預約？'))return; await api('DELETE',`/api/admin/bookings/${id}`); loadDashboard(); loadAdminBookings(); }

async function loadPrices(){
  const r=await api('GET','/api/admin/prices');
  const rules=r.rules||[];
  document.getElementById('priceTable').innerHTML=rules.map(r=>`<tr>
    <td><input value="${r.label}" id="pl_${r.id}" style="width:100px"/></td>
    <td><input type="number" value="${r.hour_start}" id="ps_${r.id}" style="width:60px"/></td>
    <td><input type="number" value="${r.hour_end}" id="pe_${r.id}" style="width:60px"/></td>
    <td><input type="number" value="${r.price_member}" id="pm_${r.id}" style="width:80px"/></td>
    <td><input type="number" value="${r.price_non_member}" id="pn_${r.id}" style="width:80px"/></td>
    <td>
      <button class="btn-sm green" onclick="savePrice(${r.id})">儲存</button>
      <button class="btn-sm red" onclick="deletePrice(${r.id})" style="margin-left:4px">刪除</button>
    </td>
  </tr>`).join('');
}

async function savePrice(id){
  await api('PUT',`/api/admin/prices/${id}`,{
    label:document.getElementById(`pl_${id}`).value,
    hour_start:+document.getElementById(`ps_${id}`).value,
    hour_end:+document.getElementById(`pe_${id}`).value,
    price_member:+document.getElementById(`pm_${id}`).value,
    price_non_member:+document.getElementById(`pn_${id}`).value
  });
  alert('✓ 已儲存'); loadPrices();
}
async function deletePrice(id){ if(!confirm('確定刪除？'))return; await api('DELETE',`/api/admin/prices/${id}`); loadPrices(); }
async function addPriceRule(){
  await api('POST','/api/admin/prices',{
    label:document.getElementById('nLabel').value,
    hour_start:+document.getElementById('nStart').value,
    hour_end:+document.getElementById('nEnd').value,
    price_member:+document.getElementById('nMember').value,
    price_non_member:+document.getElementById('nNonMember').value
  });
  alert('✓ 新增成功'); loadPrices();
}

async function loadCourts(){
  const r=await api('GET','/api/courts');
  const courts=r.courts||[];
  document.getElementById('courtsTable').innerHTML=`<table>
    <thead><tr><th>場地</th><th>說明</th><th>個別定價（會員）</th><th>個別定價（非會員）</th><th>啟用</th><th>操作</th></tr></thead>
    <tbody>${courts.map(c=>`<tr>
      <td><input value="${c.name}" id="cn_${c.id}" style="width:80px"/></td>
      <td><input value="${c.description||''}" id="cd_${c.id}"/></td>
      <td><input type="number" placeholder="不填=使用時段定價" value="${c.price_override?.member||''}" id="cpm_${c.id}" style="width:100px"/></td>
      <td><input type="number" placeholder="不填=使用時段定價" value="${c.price_override?.non_member||''}" id="cpn_${c.id}" style="width:100px"/></td>
      <td><input type="checkbox" ${c.is_active?'checked':''} id="ca_${c.id}"/></td>
      <td><button class="btn-sm green" onclick="saveCourt(${c.id})">儲存</button></td>
    </tr>`).join('')}</tbody>
  </table>`;
}
async function saveCourt(id){
  const pm=document.getElementById(`cpm_${id}`).value;
  const pn=document.getElementById(`cpn_${id}`).value;
  await api('PUT',`/api/admin/courts/${id}`,{
    name:document.getElementById(`cn_${id}`).value,
    description:document.getElementById(`cd_${id}`).value,
    price_override:(pm&&pn)?{member:+pm,non_member:+pn}:null,
    is_active:document.getElementById(`ca_${id}`).checked
  });
  alert('✓ 已儲存'); loadCourts();
}

async function loadMembers(){
  const r=await api('GET','/api/admin/members');
  const ms=r.members||[];
  document.getElementById('membersTable').innerHTML=ms.map(m=>`<tr>
    <td>${m.name}</td>
    <td>${m.phone}</td>
    <td><span class="badge ${m.is_member?'st-paid':'st-cancelled'}">${m.is_member?'會員':'一般'}</span></td>
    <td>${m.member_expire_at?new Date(m.member_expire_at).toLocaleDateString('zh-TW'):'—'}</td>
    <td>
      ${!m.is_member?`<button class="btn-sm green" onclick="setMember('${m.id}',true)">升級會員</button>`:''}
      ${m.is_member?`<button class="btn-sm red" onclick="setMember('${m.id}',false)">取消會員</button>`:''}
    </td>
  </tr>`).join('');
}
async function setMember(id,val){
  const days=val?parseInt(prompt('會員有效天數？',365)||365):0;
  await api('PATCH',`/api/admin/members/${id}/membership`,{is_member:val,expire_days:days});
  loadMembers();
}

async function changeAdminPwd(){
  const o=document.getElementById('oldPwd').value;
  const n=document.getElementById('newPwd').value;
  const n2=document.getElementById('newPwd2').value;
  const msg=document.getElementById('pwdMsg');
  if(n!==n2){msg.style.color='#dc2626';msg.textContent='新密碼不一致';return;}
  try{
    await api('POST','/api/admin/change-password',{oldPassword:o,newPassword:n});
    msg.style.color='#0a6e4e';msg.textContent='✓ 密碼已更新';
  }catch(e){msg.style.color='#dc2626';msg.textContent=e.message;}
}

async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(adminToken) opts.headers['Authorization']='Bearer '+adminToken;
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(path,opts);
  const data=await r.json();
  if(!r.ok) throw new Error(data.error||'請求失敗');
  return data;
}
function showErr(id,msg){const el=document.getElementById(id);el.textContent=msg;el.style.display='block';}

document.getElementById('adminPwd').addEventListener('keydown',e=>{if(e.key==='Enter')doAdminLogin();});
</script>
</body>
</html>
