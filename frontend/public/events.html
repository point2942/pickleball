<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>活動報名 - 匹克球場地預約</title>
<style>
  *{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;margin:0;padding:0}
  body{background:#f3f4f6;color:#111827}
  .header{background:#0a6e4e;color:#fff;padding:18px 20px;font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
  .container{max-width:480px;margin:0 auto;padding:16px}
  .card{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);padding:18px;margin-bottom:14px}
  .event-title{font-size:17px;font-weight:700;color:#111827;margin-bottom:6px}
  .event-meta{font-size:13.5px;color:#6b7280;display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
  .event-desc{font-size:13.5px;color:#374151;line-height:1.6;margin-bottom:12px;white-space:pre-wrap}
  .spots-badge{display:inline-block;font-size:12.5px;font-weight:700;padding:4px 12px;border-radius:20px}
  .spots-ok{background:#eafaf1;color:#0a6e4e}
  .spots-low{background:#fef3c7;color:#92400e}
  .spots-full{background:#fee2e2;color:#991b1b}
  .fee-badge{font-size:15px;font-weight:700;color:#0a6e4e}
  .btn-green{width:100%;background:#0a6e4e;color:#fff;border:none;padding:13px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px}
  .btn-green:hover{background:#085c40}
  .btn-green:disabled{background:#9ca3af;cursor:not-allowed}
  .btn-outline{width:100%;background:#fff;color:#0a6e4e;border:1.5px solid #0a6e4e;padding:11px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
  .form-group{margin-bottom:14px}
  label{display:block;font-size:13px;color:#374151;margin-bottom:6px;font-weight:500}
  input,select{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px}
  input:focus,select:focus{outline:none;border-color:#0a6e4e}
  .empty-state{text-align:center;color:#9ca3af;padding:40px 0;font-size:14px}
  .err{font-size:13px;color:#dc2626;margin-top:6px;display:none}
  .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
  .modal h3{font-size:16px;margin-bottom:14px}
  .pay-methods{display:flex;flex-direction:column;gap:8px;margin:12px 0}
  .btn-pay-option{padding:13px;border:1.5px solid #e5e7eb;border-radius:10px;background:#fff;cursor:pointer;font-size:14.5px;font-weight:600;color:#374151;text-align:left}
  .btn-pay-option:hover{border-color:#0a6e4e;background:#f0fdf4;color:#0a6e4e}
  .tab-toggle{display:flex;background:#f3f4f6;border-radius:10px;padding:3px;margin-bottom:16px}
  .tab-toggle button{flex:1;padding:9px;border:none;background:none;border-radius:8px;font-size:13.5px;font-weight:600;color:#6b7280;cursor:pointer}
  .tab-toggle button.active{background:#fff;color:#0a6e4e;box-shadow:0 1px 3px rgba(0,0,0,.1)}
  .points-box{background:#f0fdf4;border:1px solid #b7ebcf;border-radius:10px;padding:12px;margin-bottom:14px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 20px;border-radius:8px;font-size:13.5px;z-index:300;display:none}
</style>
</head>
<body>
  <div class="header">🏓 活動報名</div>
  <div class="container" id="listContainer">
    <div class="empty-state">載入中...</div>
  </div>

  <!-- 報名 Modal -->
  <div class="modal-overlay" id="registerModal">
    <div class="modal">
      <h3 id="modalEventTitle">報名活動</h3>
      <div class="tab-toggle" id="identityToggle">
        <button class="active" onclick="setIdentityMode('member')" id="btnModeMember">會員登入報名</button>
        <button onclick="setIdentityMode('guest')" id="btnModeGuest">訪客報名</button>
      </div>

      <!-- 會員模式 -->
      <div id="memberModeBox">
        <div id="memberLoggedOutBox">
          <div class="form-group">
            <label>手機號碼</label>
            <input type="tel" id="memberPhone" placeholder="09xxxxxxxx" maxlength="10"/>
          </div>
          <div class="form-group">
            <label>密碼</label>
            <input type="password" id="memberPassword" placeholder="請輸入密碼"/>
          </div>
          <div class="err" id="memberLoginErr"></div>
          <button class="btn-green" onclick="memberLoginAndContinue()">登入並繼續報名</button>
        </div>
        <div id="memberLoggedInBox" style="display:none">
          <div style="font-size:14px;color:#374151;margin-bottom:10px">您好，<strong id="loggedInName"></strong>（<span id="loggedInPhone"></span>）</div>
          <div class="points-box" id="memberPointsBox" style="display:none">
            <div style="font-size:13px;color:#0a6e4e;font-weight:600;margin-bottom:6px">使用點數折抵（餘額：<span id="memberPointsBalance">0</span> 點）</div>
            <div style="display:flex;gap:8px">
              <input type="number" id="memberUsePoints" min="0" placeholder="0" oninput="updateMemberFeeSummary()"/>
              <button class="btn-outline" style="margin:0;width:auto;padding:0 14px;white-space:nowrap" onclick="useMaxMemberPoints()">全部折抵</button>
            </div>
            <div id="memberFeeSummary" style="font-size:12.5px;color:#6b7280;margin-top:6px"></div>
          </div>
          <div id="memberPayMethodsBox" class="pay-methods"></div>
          <button class="btn-green" id="memberSubmitBtn" onclick="submitMemberRegistration()">確認報名</button>
          <button class="btn-outline" onclick="memberLogout()">登出 / 切換帳號</button>
        </div>
      </div>

      <!-- 訪客模式 -->
      <div id="guestModeBox" style="display:none">
        <div class="form-group">
          <label>姓名</label>
          <input type="text" id="guestName" placeholder="請輸入姓名"/>
        </div>
        <div class="form-group">
          <label>手機號碼</label>
          <input type="tel" id="guestPhone" placeholder="09xxxxxxxx" maxlength="10"/>
        </div>
        <div id="guestFeeNotice" style="font-size:13px;color:#6b7280;margin-bottom:10px"></div>
        <div id="guestPayMethodsBox" class="pay-methods"></div>
        <div class="err" id="guestErr"></div>
        <button class="btn-green" id="guestSubmitBtn" onclick="submitGuestRegistration()">確認報名</button>
      </div>

      <button class="btn-outline" onclick="closeRegisterModal()">取消</button>
    </div>
  </div>

  <div class="toast" id="toastBox"></div>

<script>
const API = '';
let events = [];
let currentEvent = null;
let memberToken = localStorage.getItem('pb_token');
let memberUser = JSON.parse(localStorage.getItem('pb_user') || 'null');
let selectedMemberPay = null;
let selectedGuestPay = null;

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (memberToken) opts.headers['Authorization'] = 'Bearer ' + memberToken;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || '請求失敗');
  return data;
}

function toast(msg) {
  const el = document.getElementById('toastBox');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const dow = ['日','一','二','三','四','五','六'][d.getDay()];
  return `${d.getMonth()+1}/${d.getDate()}（${dow}）`;
}

async function loadEvents() {
  try {
    const r = await api('GET', '/api/events');
    events = r.events || [];
    renderEvents();
  } catch (e) {
    document.getElementById('listContainer').innerHTML = `<div class="empty-state">載入失敗：${e.message}</div>`;
  }
}

function renderEvents() {
  const el = document.getElementById('listContainer');
  if (!events.length) { el.innerHTML = '<div class="empty-state">目前沒有開放報名的活動</div>'; return; }

  el.innerHTML = events.map(ev => {
    const spotsLeft = ev.spots_left;
    let badge;
    if (spotsLeft <= 0) badge = `<span class="spots-badge spots-full">名額已滿（可候補）</span>`;
    else if (spotsLeft <= 3) badge = `<span class="spots-badge spots-low">剩 ${spotsLeft} 個名額</span>`;
    else badge = `<span class="spots-badge spots-ok">剩 ${spotsLeft} 個名額</span>`;

    return `<div class="card">
      <div class="event-title">${ev.title}</div>
      <div class="event-meta">
        <span>📅 ${fmtDate(ev.event_date)} ${String(ev.start_hour).padStart(2,'0')}:00～${String(ev.end_hour).padStart(2,'0')}:00</span>
        ${ev.location ? `<span>📍 ${ev.location}</span>` : ''}
        <span>👥 共 ${ev.capacity} 個名額</span>
      </div>
      ${ev.description ? `<div class="event-desc">${ev.description}</div>` : ''}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
        ${badge}
        <span class="fee-badge">${ev.fee > 0 ? `NT$${ev.fee}` : '免費'}</span>
      </div>
      <button class="btn-green" onclick="openRegisterModal(${ev.id})">${spotsLeft > 0 ? '我要報名' : '加入候補'}</button>
    </div>`;
  }).join('');
}

function openRegisterModal(eventId) {
  currentEvent = events.find(e => e.id === eventId);
  if (!currentEvent) return;
  document.getElementById('modalEventTitle').textContent = currentEvent.title;
  selectedMemberPay = null; selectedGuestPay = null;
  document.getElementById('guestName').value = '';
  document.getElementById('guestPhone').value = '';
  document.getElementById('guestErr').style.display = 'none';
  document.getElementById('memberLoginErr').style.display = 'none';

  renderPayMethods();
  setIdentityMode(memberToken ? 'member' : 'member');
  if (memberToken && memberUser) showLoggedInMemberBox(); else showLoggedOutMemberBox();

  const guestNotice = document.getElementById('guestFeeNotice');
  guestNotice.textContent = currentEvent.fee > 0
    ? `報名費 NT$${currentEvent.fee}，訪客僅支援線上付款`
    : '本活動免費，填寫資料即可完成報名';
  document.getElementById('guestPayMethodsBox').style.display = currentEvent.fee > 0 ? 'flex' : 'none';

  document.getElementById('registerModal').classList.add('open');
}
function closeRegisterModal() { document.getElementById('registerModal').classList.remove('open'); }

function setIdentityMode(mode) {
  document.getElementById('btnModeMember').classList.toggle('active', mode === 'member');
  document.getElementById('btnModeGuest').classList.toggle('active', mode === 'guest');
  document.getElementById('memberModeBox').style.display = mode === 'member' ? 'block' : 'none';
  document.getElementById('guestModeBox').style.display = mode === 'guest' ? 'block' : 'none';
}

function showLoggedOutMemberBox() {
  document.getElementById('memberLoggedOutBox').style.display = 'block';
  document.getElementById('memberLoggedInBox').style.display = 'none';
}
async function showLoggedInMemberBox() {
  document.getElementById('memberLoggedOutBox').style.display = 'none';
  document.getElementById('memberLoggedInBox').style.display = 'block';
  document.getElementById('loggedInName').textContent = memberUser.name;
  document.getElementById('loggedInPhone').textContent = memberUser.phone;

  const pointsBox = document.getElementById('memberPointsBox');
  if (currentEvent.fee > 0) {
    pointsBox.style.display = 'block';
    try {
      const r = await api('GET', '/api/points/balance');
      document.getElementById('memberPointsBalance').textContent = r.balance.toLocaleString();
      document.getElementById('memberUsePoints').dataset.balance = r.balance;
    } catch {}
  } else {
    pointsBox.style.display = 'none';
  }
  document.getElementById('memberUsePoints').value = '';
  updateMemberFeeSummary();
}

function useMaxMemberPoints() {
  const balance = parseInt(document.getElementById('memberUsePoints').dataset.balance) || 0;
  const max = Math.min(balance, currentEvent.fee);
  document.getElementById('memberUsePoints').value = max;
  updateMemberFeeSummary();
}

function updateMemberFeeSummary() {
  const fee = currentEvent.fee || 0;
  const balance = parseInt(document.getElementById('memberUsePoints').dataset.balance) || 0;
  let used = parseInt(document.getElementById('memberUsePoints').value) || 0;
  const maxUsable = Math.min(balance, fee);
  if (used > maxUsable) { used = maxUsable; document.getElementById('memberUsePoints').value = used; }
  const remaining = fee - used;

  const summaryEl = document.getElementById('memberFeeSummary');
  const payBox = document.getElementById('memberPayMethodsBox');
  const submitBtn = document.getElementById('memberSubmitBtn');

  if (fee === 0) {
    summaryEl.textContent = ''; payBox.style.display = 'none';
    submitBtn.disabled = false; selectedMemberPay = null;
    return;
  }
  if (remaining === 0 && used > 0) {
    summaryEl.innerHTML = `<strong style="color:#0a6e4e">點數已全額折抵，無需付款！</strong>`;
    payBox.style.display = 'none';
    selectedMemberPay = 'points_full';
    submitBtn.disabled = false;
  } else {
    summaryEl.textContent = used > 0 ? `折抵 NT$${used}，剩餘 NT$${remaining} 需線上付款` : `報名費 NT$${fee}`;
    payBox.style.display = 'flex';
    if (selectedMemberPay === 'points_full') selectedMemberPay = null;
    submitBtn.disabled = !selectedMemberPay;
  }
}

function renderPayMethods() {
  const html = `
    <button type="button" class="btn-pay-option" onclick="selectPay('member','ecpay')">💳 信用卡（綠界）</button>
    <button type="button" class="btn-pay-option" onclick="selectPay('member','linepay')">🟢 LINE Pay</button>
  `;
  document.getElementById('memberPayMethodsBox').innerHTML = html;
  document.getElementById('guestPayMethodsBox').innerHTML = html.replace(/'member'/g, "'guest'");
}

function selectPay(scope, method) {
  if (scope === 'member') {
    selectedMemberPay = method;
    document.getElementById('memberSubmitBtn').disabled = false;
  } else {
    selectedGuestPay = method;
    document.getElementById('guestSubmitBtn').disabled = false;
  }
}

async function memberLoginAndContinue() {
  const phone = document.getElementById('memberPhone').value.trim();
  const password = document.getElementById('memberPassword').value;
  const errEl = document.getElementById('memberLoginErr');
  if (!phone || !password) { errEl.textContent = '請填寫手機與密碼'; errEl.style.display = 'block'; return; }
  try {
    const r = await fetch('/api/auth/member/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ phone, password }) });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error === 'NEEDS_SETUP' ? '此帳號尚未設定密碼，請先到主網站完成設定' : (data.error || '登入失敗'));
    memberToken = data.token; memberUser = data.user;
    localStorage.setItem('pb_token', memberToken);
    localStorage.setItem('pb_user', JSON.stringify(memberUser));
    showLoggedInMemberBox();
  } catch (e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
  }
}
function memberLogout() {
  memberToken = null; memberUser = null;
  localStorage.removeItem('pb_token'); localStorage.removeItem('pb_user');
  showLoggedOutMemberBox();
}

async function submitMemberRegistration() {
  if (currentEvent.fee > 0 && !selectedMemberPay) return;
  const usePoints = parseInt(document.getElementById('memberUsePoints').value) || 0;
  const paymentMethod = selectedMemberPay === 'points_full' ? null : selectedMemberPay;
  await doRegister({ usePoints, paymentMethod });
}
async function submitGuestRegistration() {
  const name = document.getElementById('guestName').value.trim();
  const phone = document.getElementById('guestPhone').value.trim();
  const errEl = document.getElementById('guestErr');
  if (!name || !phone) { errEl.textContent = '請填寫姓名與手機號碼'; errEl.style.display = 'block'; return; }
  if (currentEvent.fee > 0 && !selectedGuestPay) { errEl.textContent = '請選擇付款方式'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  await doRegister({ guestName: name, guestPhone: phone, paymentMethod: selectedGuestPay }, true);
}

async function doRegister(payload, isGuest) {
  const btnId = isGuest ? 'guestSubmitBtn' : 'memberSubmitBtn';
  const errElId = isGuest ? 'guestErr' : 'memberLoginErr';
  const btn = document.getElementById(btnId);
  btn.disabled = true; btn.textContent = '處理中...';
  try {
    const opts = { method: 'POST', headers: { 'Content-Type': 'application/json' } };
    if (!isGuest && memberToken) opts.headers['Authorization'] = 'Bearer ' + memberToken;
    opts.body = JSON.stringify(payload);
    const r = await fetch(`/api/events/${currentEvent.id}/register`, opts);
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || '報名失敗');

    if (data.gateway === 'ecpay') {
      const form = document.createElement('form');
      form.method = 'POST'; form.action = data.url;
      Object.entries(data.params).forEach(([k,v]) => {
        const inp = document.createElement('input'); inp.type='hidden'; inp.name=k; inp.value=v;
        form.appendChild(inp);
      });
      document.body.appendChild(form); form.submit();
      return;
    }
    if (data.gateway === 'linepay') { window.location.href = data.paymentUrl; return; }

    closeRegisterModal();
    toast(data.message || '報名成功！');
    loadEvents();
  } catch (e) {
    toast(e.message);
  } finally {
    btn.disabled = false; btn.textContent = '確認報名';
  }
}

loadEvents();
</script>
</body>
</html>
